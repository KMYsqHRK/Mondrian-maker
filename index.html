<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Maker</title>
  <meta property="og:title" content="Mondrian Maker">
  <meta property="og:description" content="モンドリアン風アートをブラウザで生成しよう">
  <link rel="icon" href="img/favicon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-accent">
    <div class="accent-block accent-red"></div>
    <div class="accent-block accent-blue"></div>
    <div class="accent-block accent-yellow"></div>
  </div>
  <h1>Mondrian Maker</h1>
  <div class="header-right">モンドリアン風アート生成</div>
</header>

<main>
  <div class="canvas-wrapper">
    <canvas id="mondrian-canvas"></canvas>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Iterations -->
    <div class="control-row">
      <div class="label-row">
        <span class="control-label">Iterations</span>
        <span class="control-value" id="iter-val">30</span>
      </div>
      <input type="range" id="iter-slider" min="10" max="50" value="30" step="1">
    </div>

    <!-- Color Rate -->
    <div class="control-row">
      <div class="label-row">
        <span class="control-label">カラー率</span>
        <span class="control-value" id="color-val">30%</span>
      </div>
      <input type="range" id="color-slider" min="0" max="100" value="30" step="5">
    </div>

    <!-- Color Picker -->
    <div class="control-row" style="grid-column: 1 / -1; border-right: none;">
      <span class="control-label">カラー</span>
      <div class="color-swatches" id="color-swatches">
        <button class="color-swatch active" data-color="#E63946" style="background:#E63946;" title="赤" aria-label="赤"></button>
        <button class="color-swatch"        data-color="#F4831F" style="background:#F4831F;" title="オレンジ" aria-label="オレンジ"></button>
        <button class="color-swatch active" data-color="#F7C31B" style="background:#F7C31B;" title="黄" aria-label="黄"></button>
        <button class="color-swatch"        data-color="#2DC653" style="background:#2DC653;" title="緑" aria-label="緑"></button>
        <button class="color-swatch active" data-color="#1A53A0" style="background:#1A53A0;" title="青" aria-label="青"></button>
        <button class="color-swatch"        data-color="#7B2D8B" style="background:#7B2D8B;" title="紫" aria-label="紫"></button>
      </div>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="actions">
    <button class="action-btn btn-generate" id="btn-generate">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
      生成
    </button>
    <button class="action-btn btn-download" id="btn-download">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
      保存
    </button>
    <button class="action-btn btn-twitter" id="btn-twitter">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
      X でシェア
    </button>
    <button class="action-btn btn-line" id="btn-line">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.105.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
      </svg>
      LINE でシェア
    </button>
  </div>
</main>

<div id="toast">画像を保存しました</div>

<footer>
  Mondrian Maker &nbsp;|&nbsp; inspired by Piet Mondrian
</footer>

<script src="main.js"></script>
</body>
</html>
